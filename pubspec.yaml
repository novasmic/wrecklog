name: wrecklog
description: A simple vehicle dismantling and parts tracking app.
publish_to: "none"

version: 2.0.0+124

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  share_plus: ^12.0.2
  file_picker: ^8.0.0+1
  path_provider: ^2.1.2
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.4.0+8
  image_picker: ^1.1.2
  path: ^1.9.0
  photo_view: ^0.15.0
  package_info_plus: ^8.0.0
  gal: ^2.3.0
  archive: ^3.6.1
  facebook_app_events: ^0.27.0
  firebase_core: ^3.0.0
  firebase_crashlytics: ^4.0.0
  firebase_analytics: ^11.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  web: ^1.0.0
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.0
  image: ^4.3.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  drift_dev: ^2.20.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icon/
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: assets/icon/icon_fg.png
  image_path_ios: assets/icon/icon_ios.png
  adaptive_icon_foreground: assets/icon/icon_adaptive_fg.png
  adaptive_icon_background: "#1A1A1A"
